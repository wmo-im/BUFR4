name: Checks for pull request into master branch

on:
  pull_request:
    branches:
      - master

jobs:
  check-descriptor-XY-range:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Fetch master
        run: | 
          git fetch origin master
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Check descriptor XY ranges
        run: |
          python .github/scripts/check_descriptor_XY_ranges.py

